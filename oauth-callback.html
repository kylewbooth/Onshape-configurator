<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .message {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
        }
        
        .message h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .message p {
            color: #666;
            font-size: 14px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <h1>Completing authentication...</h1>
        <p>Please wait while we redirect you back to the app.</p>
    </div>
    
    <script>
        // This page receives the OAuth callback and passes the code back to the main page
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        
        if (error) {
            document.querySelector('.message').innerHTML = `
                <h1>❌ Authentication Failed</h1>
                <p>Error: ${error}</p>
                <p>Please close this window and try again.</p>
            `;
        } else if (code) {
            // Redirect back to main page with the code
            const mainPageUrl = window.location.origin + window.location.pathname.replace('oauth-callback.html', 'onshape-oauth-configurator.html') + '?code=' + code;
            window.location.href = mainPageUrl;
        } else {
            document.querySelector('.message').innerHTML = `
                <h1>⚠️ Invalid Response</h1>
                <p>No authorization code received.</p>
                <p>Please close this window and try again.</p>
            `;
        }
    </script>
</body>
</html>
